id: "gergokonyv-legkisebbek"
title: "Gergőkönyv – A legkisebbek könyve"
series: "Anna, Peti és Gergő"
publisher: "Alexandra Kiadó"
description: "A legkisebb testvér, Gergő könyve — tizenhat mese a kakaóról, a boltos játékról, az első „miért?” kérdésektől a körömvágásig és az autóvezetésről való álmodozásig."
