pageEnd: 161
summary: "Egy napsütéses őszi napon a család kirándulni indul autóval a Hármashatár-hegyre. Az erdőben gesztenyét, csipkebogyót, makkot és tobozt gyűjtenek, mókust és vakondot figyelnek, és nagy csokor színes falevelet szednek. Otthon a termésekből és a lepréselt levelekből állatfigurákat, kis családot és képeket készítenek."
