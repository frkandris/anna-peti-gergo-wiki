summary: "Anna szülei elárulják, hogy kistestvére születik, és a család izgatottan készül az érkezésére. A kórházban megszületik a kisöccse, Peti, akit ötödik nap mózeskosárban visznek haza a téli hidegben. Anna eleinte a nagymamánál marad, majd otthon boldogan segít gondozni és babusgatni az újszülöttet."
