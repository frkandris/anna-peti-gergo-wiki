summary: "Egy tavaszi reggelen a család a ligeten át a budapesti állatkertbe indul, ahol sorra megcsodálják a fókákat, majmokat, a zsiráfot, az elefántokat és a többi állatot. Az elefántok ormányukkal jól megöntözik a családot, az állatsimogatóban pedig Anna kecskét etet, Peti báránykát simogat, és pónin is lovagolnak. Végül a pálmaházban, az akváriumban és a nagy faragott fakrokodilnál is kalandoznak, majd a fárasztó séta végén a gyerekek hazafelé menet elalszanak."
