pageEnd: 208
summary: "Egy napsütéses téli reggelen Anna észreveszi, hogy sok hó esett, és az egész család kimegy a hóba. Apa lehozza az erkélyről a szánkót, és felváltva húzzák egymást, hógolyóznak, majd négy hóembert építenek: egy Apa-, egy Anya-, egy Anna- és egy Peti-hóembert. Hazafelé újra esni kezd a hó, a szülők esernyő alatt csúszkálnak a jeges úton, a gyerekek pedig fáradtan elalszanak. A kis szánkó visszakerül az erkélyre, és várja a következő sétát a havas Városligetbe."
