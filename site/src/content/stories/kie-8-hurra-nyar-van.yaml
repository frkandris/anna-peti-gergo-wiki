summary: "Megérkezik a nyár, és a család a Balatonra utazik nyaralni. Fürdenek és csónakáznak a tóban, a játszótéren és a réten játszanak, komppal átkelnek Tihanyba, ahol megnézik az apátság templomát és a sok színes vitorlást. Fagyiznak, késő estig a csillagos eget csodálják, majd otthon az erkélyen folytatják a lubickolást."
