summary: "Anya mérgesen szól rá Annára és Petire, hogy rakjanak rendet a szobájukban, de a gyerekek inkább rajzolni akarnak, és durcásan a konyhába vonulnak. Amikor később Anna kéri, hogy Anya vegye le a polcról a játék macskát és ragassza meg a szakadt rajzot, Anya ugyanazzal a kifogással él, mint korábban a gyerekek: éppen nincs rá ideje. Anna megérti a leckét, és Petivel gyorsan gyönyörű rendet raknak, amiért Anya megdicséri őket. A durcás napon készült tulipános rajzot Anya azóta is őrzi."
