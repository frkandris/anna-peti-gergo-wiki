summary: "December 24-én Anna és Peti Anyával színes papírdíszeket készítenek, mézeskalácsot sütnek, és feldíszítik a fenyőágakat. Anya elkészíti az ünnepi ebédet, Apa megterít és meggyújtja az adventi koszorú negyedik gyertyáját, majd ebéd után a család lepihen. Amikor a gyerekek felébrednek, szép ruhába öltöznek, és a csengőszóra belépnek a nappaliba, ahol ott áll a feldíszített karácsonyfa és alatta az ajándékok. Anna egy játék babakocsit kap babával, Peti pedig színes autókat alagútrendszerrel; késő estig boldogan játszanak új ajándékaikkal."
