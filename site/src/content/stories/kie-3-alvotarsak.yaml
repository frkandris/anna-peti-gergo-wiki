summary: "Petinek fáj a foga, és éjszakánként sírásával felébreszti Annát, aki egyedül maradva a szobában félni kezd. A szülők felváltva olvasnak és virrasztanak mellette, míg Anya végül azt találja ki, hogy varr egy anya- és egy apa-rongybabát. A két baba esténként a fotelben őrködik, és Anna többé nem fél elaludni."
