summary: "Peti fokozatosan tanul mozogni: előbb átfordul, felül, elmászik, majd bútorokba kapaszkodva feláll és totyog. Anna végig lelkesen biztatja, és megvigasztalja, ha elesik vagy beüti a fejét. Egy tavaszi napon Peti Annától Anyáig megteszi első önálló lépéseit, amit Apa fényképen is megörökít. Ettől kezdve Peti mindenhol boldogan gyalogol, és nem akar többé babakocsiban ülni."
