summary: "Egy nyári reggelen a család a budai Libegőhöz indul, és a függőszékes felvonóval felkapaszkodnak a hegyoldalon. Anna eleinte duzzog, amiért őt nem viszik ölben, mint a járni még nem tudó Petit, de Anya meséje az Erzsébet-kilátóról feloldja a haragját. Felmásznak a János-hegyi kilátó tetejére, ahonnan csodás panoráma nyílik Budapestre, lefelé pedig a libegőről madarakat és mókust figyelnek. A gyerekek megígértetik Apával, hogy máskor is eljönnek libegőzni."
