pageEnd: 41
summary: "Egy borongós, esős őszi napon Anya azt javasolja, hogy süssenek palacsintát, és az egész család nekilát. Miközben lekváros, túrós és csokis palacsinták készülnek, a csokikrém rejtélyesen eltűnik. Kiderül, hogy a kis Peti kente össze magát és a játékait vele, amiről vidám fénykép is készül."
