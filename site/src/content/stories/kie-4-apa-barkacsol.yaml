summary: "A gyerekszobában már nem fér el a sok játék, ezért a család új szekrényt keres, de a bútorboltban egyik sem megfelelő. Apa úgy dönt, maga készít egyet: méretre fűrészeli a lapokat, összecsavarozza, és színes műanyag fiókokat tesz bele. Miközben Peti a szerszámokkal ügyködne, Anna figyelmezteti, hogy a csavar nem játék, végül pedig büszkén pakolják be kincseiket az elkészült szekrénybe."
