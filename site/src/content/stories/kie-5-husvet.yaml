summary: "Húsvét közeledtével Anya és Anna sokféle színes hímes tojást és állat alakú tojást készítenek, amelyeket barkaágakra aggatnak, és Peti is kedvet kap az ünnephez. Húsvéthétfőn Apa és Peti meglocsolják a lányokat, akik hímes tojással hálálják meg a locsolást. A család meglátogatja a nagymamát Érden, ahol igazi fehér nyuszi is várja őket, Anna pedig bőkezűen osztogatja szépséges tojásait a locsolóknak."
